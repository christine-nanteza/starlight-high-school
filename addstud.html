<!DOCTYPE html>

<head>
    <title>STARLIGHT HIGH SCHOOL | ADD STUDENT</title>
    <style>
        /* =====================
   RESET & BASE
===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background-color: #eef1f5;
    color: #333;
}

/* =====================
   HEADER (ADMIN)
===================== */
header {
    background: linear-gradient(135deg, #1e293b, #334155);
    color: #ffffff;
    padding: 25px 30px;
}

header h1 {
    font-size: 28px;
}

header h2 {
    font-size: 16px;
    font-weight: normal;
    opacity: 0.9;
    margin-top: 4px;
}

header nav {
    margin-top: 10px;
}

header nav a {
    color: #ffffff;
    text-decoration: none;
    margin-right: 15px;
    font-weight: 500;
}

header nav a:hover {
    text-decoration: underline;
}

header hr {
    border: none;
    height: 1px;
    background-color: rgba(255,255,255,0.3);
    margin-top: 15px;
}

/* =====================
   MAIN LAYOUT
===================== */
main {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
}

/* =====================
   FORM CARD
===================== */
section {
    background-color: #ffffff;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
}

section h2 {
    color: #1e293b;
    margin-bottom: 25px;
    position: relative;
    padding-bottom: 10px;
}

section h2::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 90px;
    height: 4px;
    background-color: #dc2626;
    border-radius: 4px;
}

/* =====================
   FORM ELEMENTS
===================== */
form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 25px;
}

/* Full-width fields */
form label,
form input,
form select,
form button {
    grid-column: span 2;
}

label {
    font-weight: 600;
    margin-bottom: 5px;
    color: #374151;
}

input,
select {
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    width: 100%;
    background-color: #f8fafc;
}

input:focus,
select:focus {
    outline: none;
    border-color: #2563eb;
    background-color: #ffffff;
}

/* =====================
   SUBMIT BUTTON
===================== */
button {
    margin-top: 15px;
    padding: 14px;
    background-color: #2563eb;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s ease;
}

button:hover {
    background-color: #1d4ed8;
}

/* =====================
   FOOTER
===================== */
footer {
    background-color: #1e293b;
    color: #ffffff;
    text-align: center;
    padding: 30px 20px;
    margin-top: 60px;
}

footer p {
    font-size: 14px;
    line-height: 1.7;
}

/* =====================
   RESPONSIVE DESIGN
===================== */
@media (max-width: 768px) {
    form {
        grid-template-columns: 1fr;
    }

    form label,
    form input,
    form select,
    form button {
        grid-column: span 1;
    }
}

    </style>
</head>
