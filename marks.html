<head>

    <style>
        /* =====================
   GLOBAL RESET
===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background-color: #f4f6f9;
    color: #333;
    line-height: 1.6;
}

/* =====================
   HEADER
===================== */
header {
    background-color: #1e3a5f;
    color: #ffffff;
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

header h1 {
    font-size: 26px;
}

header h2 {
    font-size: 16px;
    font-weight: normal;
    opacity: 0.9;
}

nav {
    margin-top: 10px;
}

nav a {
    color: #ffffff;
    text-decoration: none;
    margin-left: 15px;
    font-weight: 500;
}

nav a:hover {
    text-decoration: underline;
}

header hr {
    display: none;
}

/* =====================
   MAIN LAYOUT
===================== */
main {
    max-width: 1200px;
    margin: 35px auto;
    padding: 0 20px;
}

/* =====================
   SECTIONS (CARDS)
===================== */
section {
    background-color: #ffffff;
    padding: 25px;
    margin-bottom: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

section h2 {
    margin-bottom: 18px;
    color: #1e3a5f;
    position: relative;
    padding-bottom: 8px;
}

section h2::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 60px;
    height: 3px;
    background-color: #f4b400;
    border-radius: 3px;
}

/* =====================
   FORMS
===================== */
form p {
    margin-bottom: 18px;
}

label {
    font-weight: 600;
    color: #1e3a5f;
    display: block;
    margin-bottom: 6px;
}

select,
input[type="number"],
input[type="text"] {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

select:focus,
input:focus {
    outline: none;
    border-color: #1e3a5f;
}

/* =====================
   TABLE STYLING
===================== */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

table th {
    background-color: #1e3a5f;
    color: #ffffff;
    padding: 12px;
    text-align: left;
    font-size: 15px;
}

table td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

table tr:nth-child(even) {
    background-color: #f9fafb;
}

table input {
    width: 100%;
}

/* =====================
   BUTTON
===================== */
button {
    background-color: #1e3a5f;
    color: #ffffff;
    border: none;
    padding: 10px 25px;
    font-size: 15px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.3s ease;
}

button:hover {
    background-color: #16304d;
}

/* =====================
   FOOTER
===================== */
footer {
    background-color: #1e3a5f;
    color: #ffffff;
    text-align: center;
    padding: 20px 15px;
    margin-top: 40px;
    font-size: 14px;
}

footer p {
    margin-bottom: 10px;
    line-height: 1.5;
}

/* =====================
   RESPONSIVE
===================== */
@media (max-width: 768px) {
    table,
    thead,
    tbody,
    th,
    td,
    tr {
        display: block;
    }

    table tr {
        margin-bottom: 15px;
    }

    table th {
        display: none;
    }

    table td {
        padding-left: 50%;
        position: relative;
    }

    table td::before {
        position: absolute;
        left: 15px;
        top: 10px;
        font-weight: bold;
        color: #1e3a5f;
    }

    table td:nth-of-type(1)::before { content: "Subject"; }
    table td:nth-of-type(2)::before { content: "Marks"; }
    table td:nth-of-type(3)::before { content: "Grade"; }
    table td:nth-of-type(4)::before { content: "Remarks"; }
}

    </style>
</head>

                    <label>Class / Grade:</label><br>
                    <select name="class">
                        <option value="">-- Select Class --</option>
                        <option value="S1">Senior One (S1)</option>

                    </tr>

                    <tr>
                        <td>[Subject 3]</td>
                        <td><input type="number" name="marks_subject_3"></td>
                        <td><input type="text" name="grade_subject_3"></td>
                        <td><input type="text" name="remarks_subject_3"></td>
                    </tr>
                </table>

                <button type="submit">Submit</button>
            </form>
        </section>
